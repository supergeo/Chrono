<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Chrono">
<meta name="theme-color" content="#0a0c10">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Chronomètre</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c10;
    --panel: #111520;
    --border: #1e2840;
    --accent: #00e5ff;
    --accent2: #ff4757;
    --accent3: #ffd32a;
    --text: #e8eaf6;
    --muted: #4a5568;
  }

  html, body {
    height: 100%; width: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    /* safe areas for notch / home bar */
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  body {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    padding: calc(8px + env(safe-area-inset-top)) 10px calc(6px + env(safe-area-inset-bottom));
    gap: 6px;
    background-image:
      radial-gradient(ellipse at 20% 0%, rgba(0,229,255,0.07) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 100%, rgba(255,71,87,0.05) 0%, transparent 55%);
  }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    padding: 0 2px;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(20px, 4vw, 28px);
    letter-spacing: 5px;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.5);
  }

  .set-block {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px 12px;
  }

  .set-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .set-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(24px, 5vw, 36px);
    color: var(--accent3);
    min-width: 38px;
    text-align: center;
    text-shadow: 0 0 12px rgba(255,211,42,0.4);
  }

  .btn-reset {
    background: none;
    border: 1px solid var(--muted);
    color: var(--muted);
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    padding: 4px 9px;
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-reset:hover { border-color: var(--accent2); color: var(--accent2); }

  /* ─── RING SECTION ─── */
  .ring-section {
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: clamp(12px, 3vw, 28px);
    flex-shrink: 0;
  }

  .ring-wrap {
    position: relative;
    width: min(38vw, 38vh, 260px);
    height: min(38vw, 38vh, 260px);
    flex-shrink: 0;
  }

  .ring-svg {
    width: 100%; height: 100%;
    transform: rotate(-90deg);
  }

  .ring-track {
    fill: none;
    stroke: var(--border);
    stroke-width: 11;
  }

  .ring-progress {
    fill: none;
    stroke: var(--accent);
    stroke-width: 11;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.9s linear, stroke 0.3s;
    filter: drop-shadow(0 0 7px var(--accent));
  }

  .ring-progress.danger {
    stroke: var(--accent2);
    filter: drop-shadow(0 0 10px var(--accent2));
    animation: pulsering 0.5s ease-in-out infinite alternate;
  }

  @keyframes pulsering {
    from { opacity: 1; }
    to   { opacity: 0.45; }
  }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .time-display {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(40px, 10vw, 86px);
    line-height: 1;
    color: var(--text);
    letter-spacing: 2px;
    transition: color .3s;
  }

  .time-display.danger { color: var(--accent2); text-shadow: 0 0 18px rgba(255,71,87,0.6); }

  .time-sub {
    font-size: clamp(8px, 1.2vw, 11px);
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 3px;
  }

  /* ─── BUTTONS ─── */
  .btn-main, .btn-stop {
    width: clamp(64px, 13vw, 96px);
    height: clamp(64px, 13vw, 96px);
    border-radius: 50%;
    cursor: pointer;
    transition: all .2s;
    display: flex; align-items: center; justify-content: center;
    font-size: clamp(24px, 5vw, 36px);
    flex-shrink: 0;
  }

  .btn-main {
    border: 3px solid var(--accent);
    background: transparent;
    color: var(--accent);
    box-shadow: 0 0 24px rgba(0,229,255,0.2), inset 0 0 20px rgba(0,229,255,0.07);
  }
  .btn-main:hover { background: rgba(0,229,255,0.1); box-shadow: 0 0 36px rgba(0,229,255,0.4); }
  .btn-main:active { transform: scale(0.92); }
  .btn-main.running { border-color: var(--accent2); color: var(--accent2); box-shadow: 0 0 24px rgba(255,71,87,0.25); }
  .btn-main.running:hover { background: rgba(255,71,87,0.1); }

  .btn-stop {
    border: 3px solid var(--muted);
    background: transparent;
    color: var(--muted);
  }
  .btn-stop:hover { border-color: var(--accent3); color: var(--accent3); box-shadow: 0 0 24px rgba(255,211,42,0.2); }

  /* ─── PRESET GRID ─── */
  .preset-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    flex: 1;
    min-height: 0;
  }

  .btn-preset {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(16px, 3.5vw, 26px);
    letter-spacing: 2px;
    border-radius: 10px;
    cursor: pointer;
    transition: all .18s;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .btn-preset::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity .18s;
  }

  .btn-preset:hover::before { opacity: 0.08; }
  .btn-preset:hover { border-color: var(--accent); color: var(--accent); }
  .btn-preset.active {
    border-color: var(--accent);
    background: rgba(0,229,255,0.1);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0,229,255,0.15);
  }
  .btn-preset:active { transform: scale(0.96); }

  /* ─── STATUS ─── */
  footer {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    padding: 0 4px 2px;
  }

  .status-pill {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    padding: 4px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    transition: all .3s;
  }
  .status-pill.running { color: var(--accent); border-color: var(--accent); box-shadow: 0 0 8px rgba(0,229,255,0.2); }
  .status-pill.danger  { color: var(--accent2); border-color: var(--accent2); animation: blink .5s step-end infinite; }
  .status-pill.done    { color: var(--accent3); border-color: var(--accent3); }

  @keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<header>
  <div class="logo">CHRONO</div>
  <div class="set-block">
    <span class="set-label">Sets</span>
    <span class="set-value" id="setVal">0</span>
    <button class="btn-reset" onclick="resetSets()">RAZ</button>
  </div>
</header>

<div class="ring-section">
  <button class="btn-stop" onclick="stopTimer()">■</button>
  <div class="ring-wrap">
    <svg class="ring-svg" viewBox="0 0 120 120">
      <circle class="ring-track" cx="60" cy="60" r="52"/>
      <circle class="ring-progress" id="ringProgress" cx="60" cy="60" r="52"/>
    </svg>
    <div class="ring-center">
      <div class="time-display" id="timeDisplay">00:00</div>
      <div class="time-sub" id="timeSub">PRÊT</div>
    </div>
  </div>
  <button class="btn-main" id="btnPlay" onclick="togglePlay()">▶</button>
</div>

<div class="preset-grid">
  <button class="btn-preset" onclick="setPreset(15)"  data-sec="15">15s</button>
  <button class="btn-preset" onclick="setPreset(20)"  data-sec="20">20s</button>
  <button class="btn-preset" onclick="setPreset(30)"  data-sec="30">30s</button>
  <button class="btn-preset" onclick="setPreset(45)"  data-sec="45">45s</button>
  <button class="btn-preset" onclick="setPreset(60)"  data-sec="60">1min</button>
  <button class="btn-preset" onclick="setPreset(75)"  data-sec="75">1m15</button>
  <button class="btn-preset" onclick="setPreset(90)"  data-sec="90">1m30</button>
  <button class="btn-preset" onclick="setPreset(120)" data-sec="120">2min</button>
  <button class="btn-preset" onclick="setPreset(180)" data-sec="180">3min</button>
</div>

<footer>
  <div class="status-pill" id="statusPill">EN ATTENTE</div>
</footer>

<script>
  /* ─── Service Worker ─── */
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () =>
      navigator.serviceWorker.register('./sw.js')
        .then(r => console.log('SW registered', r.scope))
        .catch(e => console.warn('SW failed', e))
    );
  }

  /* ─── Audio ─── */
  let ctx;
  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    return ctx;
  }
  function playBip() {
    const ac = getCtx();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.setValueAtTime(880, ac.currentTime);
    g.gain.setValueAtTime(0.35, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.18);
    o.start(); o.stop(ac.currentTime + 0.18);
  }
  function playDong() {
    const ac = getCtx();
    [440, 554, 659].forEach((freq, i) => {
      const o = ac.createOscillator(), g = ac.createGain();
      o.connect(g); g.connect(ac.destination);
      o.type = 'sine';
      const t = ac.currentTime + i * 0.22;
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.5, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.9);
      o.start(t); o.stop(t + 1);
    });
  }

  /* ─── State ─── */
  let duration = 0, remaining = 0, running = false, interval = null, sets = 0;
  let bipPlayed = new Set();

  /* ─── Ring ─── */
  const ring = document.getElementById('ringProgress');
  const RADIUS = 52, CIRCUM = 2 * Math.PI * RADIUS;
  ring.style.strokeDasharray = CIRCUM;
  ring.style.strokeDashoffset = CIRCUM;
  function updateRing(frac) { ring.style.strokeDashoffset = CIRCUM * (1 - frac); }

  function fmt(s) {
    const m = Math.floor(s / 60), sec = Math.floor(s % 60);
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  function render() {
    const disp = document.getElementById('timeDisplay');
    const sub  = document.getElementById('timeSub');
    const pill = document.getElementById('statusPill');
    const btn  = document.getElementById('btnPlay');
    const danger = remaining <= 5 && remaining > 0 && running;

    disp.textContent = fmt(remaining);
    disp.classList.toggle('danger', danger);
    ring.classList.toggle('danger', danger);

    if (!running && remaining === duration && duration > 0) {
      sub.textContent = fmt(duration);
      pill.textContent = 'EN ATTENTE'; pill.className = 'status-pill';
      btn.textContent = '▶'; btn.classList.remove('running');
    } else if (running) {
      sub.textContent = danger ? 'ALERTE !' : 'EN COURS';
      pill.textContent = danger ? 'FIN PROCHE' : 'EN COURS';
      pill.className = 'status-pill ' + (danger ? 'danger' : 'running');
      btn.textContent = '⏸'; btn.classList.add('running');
    } else if (remaining === 0 && duration > 0) {
      sub.textContent = 'TERMINÉ';
      pill.textContent = 'TERMINÉ'; pill.className = 'status-pill done';
      btn.textContent = '▶'; btn.classList.remove('running');
    } else {
      sub.textContent = 'PRÊT';
      pill.textContent = 'EN ATTENTE'; pill.className = 'status-pill';
      btn.textContent = '▶'; btn.classList.remove('running');
    }
  }

  function tick() {
    if (remaining <= 0) {
      clearInterval(interval); interval = null; running = false; remaining = 0;
      updateRing(0); sets++;
      document.getElementById('setVal').textContent = sets;
      render(); playDong(); return;
    }
    if (remaining <= 5 && !bipPlayed.has(remaining)) { bipPlayed.add(remaining); playBip(); }
    remaining -= 1;
    updateRing(remaining / duration);
    render();
  }

  function togglePlay() {
    if (duration === 0) return;
    getCtx();
    if (running) {
      clearInterval(interval); interval = null; running = false; render();
    } else {
      if (remaining === 0) { remaining = duration; bipPlayed.clear(); }
      running = true; render();
      interval = setInterval(tick, 1000);
    }
  }

  function stopTimer() {
    clearInterval(interval); interval = null; running = false;
    remaining = duration; bipPlayed.clear();
    updateRing(1); render();
  }

  function setPreset(seconds) {
    clearInterval(interval); interval = null; running = false;
    duration = seconds; remaining = seconds; bipPlayed.clear();
    updateRing(1);
    document.querySelectorAll('.btn-preset').forEach(b =>
      b.classList.toggle('active', parseInt(b.getAttribute('data-sec')) === seconds));
    render();
  }

  function resetSets() { sets = 0; document.getElementById('setVal').textContent = 0; }

  render();
</script>
</body>
</html>
